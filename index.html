<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aquarium CAD V5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h2>Aquarium CAD V5 (Sketch Mode)</h2>

  <div class="tools">
    <button onclick="setTool('select')">Select/Move</button>
    <button onclick="setTool('rect')">Box</button>
    <button onclick="setTool('circle')">Circle</button>
    <button onclick="setTool('line')">Line</button>

    <label>Stroke
      <input id="stroke" type="number" value="2">
    </label>

    <label>Snap
      <input id="snap" type="number" value="10">
    </label>
  </div>
</div>

<div class="workspace">
  <canvas id="canvas"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
