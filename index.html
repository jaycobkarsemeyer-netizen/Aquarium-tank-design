<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aquarium CAD Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h2>Aquarium CAD (VCarve Lite)</h2>

  <div class="buttons">
    <button onclick="setTool('select')">Select</button>
    <button onclick="setTool('box')">Box</button>
    <button onclick="setTool('circle')">Circle</button>
    <button onclick="deleteSelected()">Delete</button>
    <button onclick="duplicate()">Duplicate</button>
    <button onclick="exportSVG()">Export SVG</button>
  </div>

  <div class="settings">
    <label>Snap <input id="snap" type="number" value="10"></label>
  </div>
</div>

<div class="container">
  <canvas id="canvas"></canvas>

  <div class="panel">
    <h3>Properties</h3>

    <label>X <input id="x"></label>
    <label>Y <input id="y"></label>
    <label>W <input id="w"></label>
    <label>H <input id="h"></label>
    <label>R <input id="r"></label>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
